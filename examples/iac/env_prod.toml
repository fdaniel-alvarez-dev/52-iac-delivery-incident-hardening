[env]
name = "prod"

[terraform]
required_version = "1.6.6"

[state]
backend = "s3"
bucket = "portfolio-tfstate-prod"
region = "us-east-1"
lock_table = "portfolio-tf-locks-prod"
encryption = true

[providers.aws]
version = "5.36.0"

[modules.network]
source = "git::https://example.com/iac/modules/network.git"
version = "1.2.3"

[workload]
instance_type = "t3.small"
instance_count = 3

